name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks (Turbo)
        run: pnpm turbo run lint check-types build
        env:
          DATABASE_URL: mongodb://127.0.0.1:27017/portfolio-ci
          PAYLOAD_SECRET: ci-test-secret-min-32-chars-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          CRON_SECRET: ci-cron-secret
          PREVIEW_SECRET: ci-preview-secret
