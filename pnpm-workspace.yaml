  feed: 5.2.1
  graphql: 16.14.0
  gray-matter: 4.0.3
  markdown-it: 14.2.0
  next-sitemap: 4.2.3
  prism-react-renderer: 2.4.1
  react-hook-form: 7.71.1
  reading-time: 1.5.0
  sanitize-html: 2.17.4
  sharp: 0.34.2

